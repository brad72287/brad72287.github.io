<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>book list</title>
</head>
<body>

<header>
  <h1>book list</h1>
  <span id="book-count"></span>
  <span id="last-updated"></span>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="search" autocomplete="off" />
  </div>

  <select id="tag-select">
    <option value="">+ add tag filter</option>
  </select>

  <select id="sort-select">
    <option value="title-asc">title a–z</option>
    <option value="title-desc">title z–a</option>
    <option value="author-asc">author a–z</option>
    <option value="author-desc">author z–a</option>
    <option value="year-desc">newest first</option>
    <option value="year-asc">oldest first</option>
    <option value="rating-desc">highest rated</option>
    <option value="pages-desc">most pages</option>
    <option value="words-desc">most words</option>
  </select>

  <button class="bookclub-btn" id="bookclub-btn">stuff we've read</button>
  <button class="bookclub-btn" id="potential-short-btn">stuff we could read (1 week)</button>
  <button class="bookclub-btn" id="potential-normal-btn">stuff we could read (2+ week)</button>

  <div class="toolbar-right">
    <span id="result-count"></span>
  </div>
</div>

<div id="active-filters">
  <span class="filter-label">filters:</span>
  <div id="filter-pills"></div>
  <button id="clear-filters">clear all</button>
</div>

<div id="loading">loading…</div>

<div class="table-wrap" id="table-wrap" style="display:none">
  <table>
    <thead>
      <tr>
        <th data-col="title">title</th>
        <th data-col="authors">author</th>
        <th data-col="publisher">publisher</th>
        <th data-col="year" style="text-align:center">year</th>
        <th data-col="pages" style="text-align:right">pages</th>
        <th data-col="words" style="text-align:right">words</th>
        <th data-col="rating" style="text-align:center">rating</th>
        <th data-col="tags">tags</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="empty" class="empty" style="display:none">
  <h2>no books found =(</h2>
  <p>try a different search</p>
</div>

<div class="pagination" id="pagination"></div>

<script>
const PAGE_SIZE = 50;
let allBooks   = [];
let filtered   = [];
let currentPage = 1;
let sortKey    = 'title';
let sortDir    = 'asc';
let searchVal  = '';
let activeTags = new Set();

function year(book) {
  if (!book.pubdate) return null;
  const y = new Date(book.pubdate).getFullYear();
  return isNaN(y) ? null : y;
}
function stars(rating) {
  if (!rating) return '';
  const r = parseFloat(rating);
  const full = Math.round(r);
  return '★'.repeat(full) + '☆'.repeat(Math.max(0, 5 - full));
}
function fmt(n) { return n ? n.toLocaleString() : '—'; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── active filter pills ───────────────────────────────────────────────────────
function renderFilterPills() {
  const bar   = document.getElementById('active-filters');
  const pills = document.getElementById('filter-pills');
  if (activeTags.size === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  pills.innerHTML = [...activeTags].map(t =>
    `<span class="active-tag" data-tag="${esc(t)}">${esc(t)} ×</span>`
  ).join('');
  pills.querySelectorAll('.active-tag').forEach(el => {
    el.addEventListener('click', () => { activeTags.delete(el.dataset.tag); currentPage=1; renderFilterPills(); applyFilters(); });
  });
  document.getElementById('bookclub-btn').classList.toggle('active', activeTags.has('bookclub'));
}

function toggleTag(tag) {
  if (activeTags.has(tag)) activeTags.delete(tag); else activeTags.add(tag);
  currentPage = 1;
  renderFilterPills();
  applyFilters();
}

// ── render table ──────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tbody');
  const wrap  = document.getElementById('table-wrap');
  const empty = document.getElementById('empty');
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('result-count').textContent =
    filtered.length === allBooks.length
      ? `${allBooks.length.toLocaleString()} books`
      : `${filtered.length.toLocaleString()} of ${allBooks.length.toLocaleString()} books`;

  if (filtered.length === 0) {
    wrap.style.display = 'none'; empty.style.display = 'block';
    document.getElementById('pagination').innerHTML = ''; return;
  }
  empty.style.display = 'none'; wrap.style.display = '';

  tbody.innerHTML = slice.map(b => {
    const y    = year(b);
    const tags = (b.tags||[]).filter(t => !t.startsWith('special_'))
      .map(t => `<span class="tag${activeTags.has(t)?' tag-active':''}" data-tag="${esc(t)}">${esc(t)}</span>`).join('');
    return `<tr>
      <td class="td-title">${esc(b.title||'—')}</td>
      <td class="td-author">${esc(b.authors||'—')}</td>
      <td class="td-publisher" title="${esc(b.publisher||'')}">${esc(b.publisher||'—')}</td>
      <td class="td-year">${y||'—'}</td>
      <td class="td-pages">${fmt(b['*pagecount'])}</td>
      <td class="td-words">${fmt(b['*wordcount'])}</td>
      <td class="td-rating">
        <span class="stars" title="${b['*grrating']||''}">${stars(b['*grrating'])}</span>
        <span class="rating-num">${b['*grrating'] ? b['*grrating']+' · '+fmt(b['*grvotes'])+' votes' : '—'}</span>
      </td>
      <td class="td-tags">${tags}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('.tag').forEach(el => {
    el.addEventListener('click', () => toggleTag(el.dataset.tag));
  });
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" id="prev-btn" ${currentPage===1?'disabled':''}>← Prev</button>`;
  const pages = [...new Set([1,total,currentPage,currentPage-1,currentPage+1,currentPage-2,currentPage+2].filter(p=>p>=1&&p<=total))].sort((a,b)=>a-b);
  let prev = null;
  for (const p of pages) {
    if (prev !== null && p - prev > 1) html += `<span class="page-ellipsis">…</span>`;
    html += `<button class="page-btn ${p===currentPage?'active':''}" data-p="${p}">${p}</button>`;
    prev = p;
  }
  html += `<button class="page-btn" id="next-btn" ${currentPage===total?'disabled':''}>Next →</button>`;
  pg.innerHTML = html;
  pg.querySelector('#prev-btn').addEventListener('click', () => { currentPage--; scrollToTop(); renderTable(); });
  pg.querySelector('#next-btn').addEventListener('click', () => { currentPage++; scrollToTop(); renderTable(); });
  pg.querySelectorAll('[data-p]').forEach(btn => {
    btn.addEventListener('click', () => { currentPage=+btn.dataset.p; scrollToTop(); renderTable(); });
  });
}

function scrollToTop() { document.querySelector('header').scrollIntoView({behavior:'smooth'}); }

// ── filter + sort ─────────────────────────────────────────────────────────────
function applyFilters() {
  const q = searchVal.toLowerCase().trim();
  filtered = allBooks.filter(b => {
    const matchSearch = !q || [b.title,b.authors,b.publisher,...(b.tags||[])].some(v=>v&&v.toLowerCase().includes(q));
    const matchTags = activeTags.size===0 || [...activeTags].every(t=>(b.tags||[]).includes(t));
    return matchSearch && matchTags;
  });
  filtered.sort((a,b) => {
    let av,bv;
    switch(sortKey) {
      case 'title':   av=(a.title||'').toLowerCase();   bv=(b.title||'').toLowerCase(); break;
      case 'authors': av=(a.authors||'').toLowerCase(); bv=(b.authors||'').toLowerCase(); break;
      case 'year':    av=year(a)||0;                    bv=year(b)||0; break;
      case 'rating':  av=parseFloat(a['*grrating'])||0; bv=parseFloat(b['*grrating'])||0; break;
      case 'pages':   av=a['*pagecount']||0;            bv=b['*pagecount']||0; break;
      case 'words':   av=a['*wordcount']||0;            bv=b['*wordcount']||0; break;
      default:        av=''; bv='';
    }
    if(av<bv) return sortDir==='asc'?-1:1;
    if(av>bv) return sortDir==='asc'?1:-1;
    return 0;
  });
  renderTable();
}

// ── build tag dropdown ────────────────────────────────────────────────────────
function buildTagDropdown() {
  const counts = {};
  allBooks.forEach(b=>(b.tags||[]).forEach(t=>{ if(!t.startsWith('special_')) counts[t]=(counts[t]||0)+1; }));
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const sel = document.getElementById('tag-select');
  sorted.forEach(([t,c]) => {
    const o = document.createElement('option');
    o.value=t; o.textContent=`${t} (${c})`;
    sel.appendChild(o);
  });
}

// ── events ────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => { searchVal=e.target.value; currentPage=1; applyFilters(); });

document.getElementById('tag-select').addEventListener('change', e => {
  if (e.target.value) toggleTag(e.target.value);
  e.target.value = '';
});

document.getElementById('sort-select').addEventListener('change', e => {
  const [k,d] = e.target.value.split('-');
  const km = {title:'title',author:'authors',year:'year',rating:'rating',pages:'pages',words:'words'};
  sortKey=km[k]||k; sortDir=d; currentPage=1; applyFilters();
});

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortKey===col ? (sortDir==='asc'?'desc':'asc') : 'asc';
    sortKey = col;
    document.querySelectorAll('thead th').forEach(h=>h.classList.remove('sorted-asc','sorted-desc'));
    th.classList.add(sortDir==='asc'?'sorted-asc':'sorted-desc');
    currentPage=1; applyFilters();
  });
});

document.getElementById('bookclub-btn').addEventListener('click', () => toggleTag('bookclub'));
document.getElementById('potential-short-btn').addEventListener('click', () => toggleTag('potential_short'));
document.getElementById('potential-normal-btn').addEventListener('click', () => toggleTag('potential_normal'));
document.getElementById('clear-filters').addEventListener('click', () => { activeTags.clear(); currentPage=1; renderFilterPills(); applyFilters(); });

// ── boot ──────────────────────────────────────────────────────────────────────
fetch('data.json')
  .then(r => {
    const lastMod = r.headers.get('Last-Modified');
    if (lastMod) {
      const d = new Date(lastMod);
      document.getElementById('last-updated').textContent =
        'Updated ' + d.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
    }
    return r.json();
  })
  .then(data => {
    allBooks = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('book-count').textContent = `${allBooks.length.toLocaleString()} books`;
    buildTagDropdown();
    applyFilters();
  })
  .catch(err => {
    document.getElementById('loading').textContent = 'Failed to load data.json — ' + err.message;
  });
</script>
</body>
</html>
